name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller pytest -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Build executable
        run: python build.py
      - name: Create release archive and checksum
        shell: pwsh
        run: |
          $archive = "dist/AITextOptimizer-Windows-x64.zip"
          Compress-Archive -Path "dist/AITextOptimizer.exe", "README.md", "README_zh.md", "LICENSE" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  AITextOptimizer-Windows-x64.zip" | Set-Content -Encoding ascii "dist/SHA256SUMS.txt"
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            "dist/AITextOptimizer-Windows-x64.zip" `
            "dist/SHA256SUMS.txt" `
            --title "AI Text Optimizer $env:GITHUB_REF_NAME" `
            --generate-notes
