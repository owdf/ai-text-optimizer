name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest -r requirements.txt
      - name: Run tests
        run: python -m pytest -q

  package-smoke:
    name: Package Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller -r requirements.txt
      - name: Build executable
        run: python build.py
      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist/AITextOptimizer.exe")) {
            throw "dist/AITextOptimizer.exe was not created"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: AITextOptimizer-Windows
          path: dist/AITextOptimizer.exe
          if-no-files-found: error
